spring.config.import=optional:classpath:application-local.properties

spring.application.name=core-service
server.port=${PORT:8089}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/space_design}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

app.jwt.secret=${APP_JWT_SECRET:changeme-local-dev-secret-must-be-32-bytes-long}
app.jwt.expiration-ms=86400000

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Google OAuth Web Client ID (Google Cloud Console > APIs & Services > Credentials)
app.google.client-id=${APP_GOOGLE_CLIENT_ID:REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID}

# Allowed frontend origins for CORS (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

#SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:changeme@example.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# AWS S3
aws.region=${AWS_REGION:eu-north-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:changeme}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:changeme}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:desgn-re}

# File uploads go through this server (multipart) straight to S3 via S3Client.putObject
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=210MB

# ai-service (FastAPI/uvicorn) base URL
app.ai-service-url=${APP_AI_SERVICE_URL:http://localhost:8000}
